# Server Configuration
server.port=8080
spring.application.name=tirana-events

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/tirana-events?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=tiranaEventsSecretKeyForJWTTokenGenerationAndValidation2024
jwt.expiration=86400000

# File Uploadx
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS
cors.allowed-origins=http://localhost:19006,http://localhost:8081,exp://192.168.*:19000
