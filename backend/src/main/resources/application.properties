# Server Configuration
server.port=8080
spring.application.name=tirana-events

# Database Configuration (MySQL / phpMyAdmin — db: tiranaevents)
spring.datasource.url=jdbc:mysql://localhost:3308/tiranaevents?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
# FIX B2: CRITICAL - JWT secret MUST be set via environment variable
# NO DEFAULT VALUE for security - app will fail to start if not set
jwt.secret=${JWT_SECRET}
jwt.expiration=604800000
# Token expiration: 604800000ms = 7 days (for development)
# Production should use 86400000ms = 24 hours

# File Uploadx
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:19006,http://localhost:8081,exp://192.168.*:19000}

# Notifications: in-app only (stored in MySQL). No Firebase required.
notifications.delivery=in-app
