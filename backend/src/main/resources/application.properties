# Server Configuration
server.port=8080
spring.application.name=tirana-events

# Database Configuration (MySQL / phpMyAdmin — db: tiranaevents)
spring.datasource.url=jdbc:mysql://localhost:3306/tiranaevents?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=K9xP4mT7vQ2zLs8AaN5wYcR1uJfH6kBxE3pMdT9nZvXqC7sL
jwt.expiration=86400000

# File Uploadx
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS
cors.allowed-origins=http://localhost:19006,http://localhost:8081,exp://192.168.*:19000

# Notifications: in-app only (stored in MySQL). No Firebase required.
notifications.delivery=in-app
